[env:serial-test]
platform         = espressif32
board            = esp32-c3-devkitm-1
framework        = arduino
monitor_speed    = 115200
upload_speed     = 921600
build_src_filter = -<*> +<serial_test.cpp>
build_flags      = -DARDUINO_USB_MODE=1 -DARDUINO_USB_CDC_ON_BOOT=1

[env:serial-test-esp32]
platform         = espressif32
board            = esp32dev
framework        = arduino
monitor_speed    = 115200
upload_speed     = 921600
build_src_filter = -<*> +<serial_test.cpp>

[env:ble-scan]
platform         = espressif32
board            = esp32-c3-devkitm-1
framework        = arduino
monitor_speed    = 115200
upload_speed     = 921600
build_src_filter = -<*> +<ble_scan.cpp>
lib_deps         = h2zero/NimBLE-Arduino@^1.4.3
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1

[env:button-test]
platform         = espressif32
board            = esp32-c3-devkitm-1
framework        = arduino
monitor_speed    = 115200
upload_speed     = 921600
build_src_filter = -<*> +<button_test.cpp>

[env:hue-controller]
platform  = espressif32
board     = esp32-c3-devkitm-1
framework = arduino

lib_deps =
    h2zero/NimBLE-Arduino@^1.4.3

monitor_speed    = 115200
upload_speed     = 921600
build_src_filter = -<*> +<main.cpp>

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCORE_DEBUG_LEVEL=0
